<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电影评分应用</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>电影评分</h1>
        </header>

        <div class="filters">
            <div class="filter-group" data-filter="category">
                <h3>类别</h3>
                <div class="filter-buttons">
                    <button class="active">电影</button>
                    <button>剧集</button>
                    <button>动漫</button>
                </div>
            </div>
            
            <div class="filter-group" data-filter="genre">
                <h3>类型</h3>
                <div class="filter-buttons">
                    <button class="active">全部</button>
                    <button>动作</button>
                    <button>喜剧</button>
                    <button>剧情</button>
                    <button>科幻</button>
                    <button>恐怖</button>
                    <button>动画</button>
                </div>
            </div>
            
            <div class="filter-group" data-filter="region">
                <h3>地区</h3>
                <div class="filter-buttons">
                    <button class="active">全部</button>
                    <button>华语</button>
                    <button>欧美</button>
                    <button>日本</button>
                    <button>韩国</button>
                </div>
            </div>
            
            <div class="filter-group" data-filter="year">
                <h3>年份</h3>
                <div class="filter-buttons">
                    <button class="active">全部</button>
                    <button>2025</button>
                    <button>2024</button>
                    <button>2023</button>
                    <button>2022</button>
                    <button>2021</button>
                    <button>2020</button>
                    <button>2019</button>
                    <button>2018</button>
                    <button>2017</button>
                    <button>2016</button>
                    <button>2015</button>
                    <button>2014</button>
                    <button>2013</button>
                    <button>2012</button>
                    <button>2011</button>
                    <button>2010</button>
                    <button>2009</button>
                    <button>2008</button>
                    <button>2007</button>
                    <button>2006</button>
                    <button>2005</button>
                </div>
            </div>
        </div>

        <main>
            <div id="movies-container" class="movies-grid"></div>
        </main>

        <footer>
            <p>© 2024 电影评分应用</p>
        </footer>
    </div>

    <script src="scripts/scripts.js"></script>
</body>
</html>
