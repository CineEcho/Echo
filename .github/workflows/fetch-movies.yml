name: Fetch Movie Data

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main

jobs:
  fetch-movie-data:
    runs-on: ubuntu-latest

    steps:
      # ✅ 检出仓库代码
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      # ✅ 设置 Node.js 环境
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # ✅ 安装依赖
      - name: Install dependencies
        run: |
          npm install axios dotenv

      # ✅ 运行抓取脚本
      - name: Run the movie fetch script
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          node scripts/fetch-movies.js

      # ✅ 检查 `movies.json` 是否有更改
      - name: Check if there are any changes to commit
        run: |
          git status

      # ✅ 如果有更改则提交
      - name: Commit and push the updated movie data
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/CineEcho/echo.git
          git add data/movies.json
          git commit -m "Update movie data" || echo "No changes to commit"
          git push origin main
